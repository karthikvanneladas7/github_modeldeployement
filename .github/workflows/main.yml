name: Model Training CICD

permissions:
  contents: write
  pull-requests: write

on: [push]

jobs:
  run:
    runs-on: ubuntu-latest
    container: docker://ghcr.io/iterative/cml:0-dvc2-base1
    steps:
      - uses: actions/checkout@v4

      - name: Train model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -r requirements.txt
          python train_model.py

          echo "## RF and LR Model Score" > report.md
          cat scores.txt >> report.md

          echo "## Confusion Matrix & Feature Importance" >> report.md
          echo '![](./ConfusionMatrix.png "Confusion Matrix")' >> report.md
          echo '![](./FeatureImportance.png "Feature Importance")' >> report.md

          cml comment create report.md 
